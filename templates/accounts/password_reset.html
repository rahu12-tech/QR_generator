{% extends 'base.html' %}

{% block content %}

    <h2>Forgot Password</h2>
    <p>Enter your registered email.</p>

    <form method="POST">
        {% csrf_token %}

        <input
            type="email"
            name="email"
            placeholder="Enter your email"
            required
        >

        <br><br>

        <button type="submit">
            Send Reset Link
        </button>
    </form>

    <br>

    <a href="{% url 'login' %}">
        Back to Login
    </a>

{% endblock %}
