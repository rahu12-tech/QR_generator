{% extends 'base.html' %}

{% block content %}

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow-lg p-5" style="width:450px;border-radius:25px;">

        <h2 class="text-center mb-4">Welcome</h2>

        {% if error %}
        <div class="alert alert-danger rounded-3 text-sm py-2 px-3">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" class="form-control mb-3" placeholder="Enter your username">
            <input type="password" name="password" class="form-control mb-2" placeholder="Enter your password">

            <div class="text-end mb-3">
                <a href="{% url 'password_reset' %}" class="text-decoration-none">Forgot Password?</a>
            </div>

            <button class="btn btn-dark w-100">Login</button>
        </form>

        <div class="d-flex align-items-center my-3">
            <hr class="flex-grow-1">
            <span class="mx-2 text-muted">OR</span>
            <hr class="flex-grow-1">
        </div>

        <a href="/accounts/google/login/" class="btn btn-danger w-100 mb-3">Continue with Google</a>

        <p class="text-center mb-0">
            Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
        </p>

    </div>

</div>

{% endblock %}
