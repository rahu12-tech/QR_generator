{% extends 'base.html' %}

{% block content %}

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow-lg p-5" style="width:500px;border-radius:25px;">

        <h2 class="text-center mb-4 font-bold">

            Create Account

        </h2>

        <form method="POST">

            {% csrf_token %}

            <input type="text" name="username" class="form-control mb-3" placeholder="Username">

            <input type="email" name="email" class="form-control mb-3" placeholder="Email">

            <input type="password" name="password" class="form-control mb-3" placeholder="Password">

            <button class="btn btn-primary w-100">

                Register

            </button>

        </form>

        <hr>

        <p class="mt-3 text-center">

            Already have an account

            <a href="{% url 'login' %}"
                class="text-orange-600 font-semibold no-underline border-b border-dashed border-orange-600 hover:text-gray-900 hover:border-solid hover:border-gray-900 transition-colors duration-200">Login</a>

        </p>
        <br>

        <a href="{% url 'google_login' %}" class="btn btn-danger w-100">

            Continue with Google

        </a>



    </div>

</div>

{% endblock %}
